---
- name: Unmount ALL existing NFS mounts to /dcache/*
  shell: |
    for mp in $(mount -t nfs4 | grep "/dcache/" | awk "{print \$3}"); do
      umount -f "$mp" 2>/dev/null || umount -l "$mp" 2>/dev/null || true
    done
    exit 0
  changed_when: false

- name: Create mount point directories
  file:
    path: "{{ mount_base }}{{ idx }}"
    state: directory
    mode: '0755'
  loop: "{{ range(1, 9) | list }}"
  loop_control:
    index_var: idx

- name: Mount 8 NFSv4.1 multipath shares
  mount:
    path: "{{ mount_base }}{{ idx }}"
    src: "[{{ storage_ips[idx - 1] }}]:{{ storage_export }}"
    fstype: nfs4
    opts: "{{ mount_options }},nconnect={{ nconnect }}"
    state: mounted
  loop: "{{ range(1, 9) | list }}"
  loop_control:
    index_var: idx

- name: Verify all 8 mounts
  shell: "mount | grep -c '/dcache/pool'"
  register: mount_count
  changed_when: false

- name: Check NFS connections
  shell: "ss -tnp6 state established | grep -c ':2049' || echo 0"
  register: connection_count
  changed_when: false

- name: Report
  debug:
    msg: |
      Mounts: {{ mount_count.stdout }}
      TCP connections to NFS: {{ connection_count.stdout }}
