---
- name: Install kernel build dependencies
  apt:
    name:
      - linux-source-7.0.0
      - linux-headers-7.0.0-15-generic
      - build-essential
      - flex
      - bison
      - libelf-dev
      - libssl-dev
    state: present

- name: Deploy build script
  copy:
    src: dnfs_build.py
    dest: /tmp/dnfs_build.py
    mode: '0755'

- name: Build and install custom NFS module
  command: python3 /tmp/dnfs_build.py
  register: build
  changed_when: "'BUILD COMPLETE' in build.stdout"

- name: Show build summary
  debug:
    var: build.stdout_lines

- name: Verify new module
  shell: |
    echo "Custom srcversion: $(modinfo {{ nfs_module_dest }}/nfs.ko | grep srcversion)"
    echo "Kernel: $(uname -r)"
    echo ""
    echo "REBOOT REQUIRED to activate the new NFS module."
  changed_when: false
