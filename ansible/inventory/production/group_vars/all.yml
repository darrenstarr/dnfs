---
# Storage array: Huawei OceanStor Pacific 9550, 8 virtual ports
storage_ips:
  - "fc07:2::11"
  - "fc07:2::12"
  - "fc07:2::13"
  - "fc07:2::14"
  - "fc07:2::15"
  - "fc07:2::16"
  - "fc07:2::17"
  - "fc07:2::18"

storage_export: "/dCache"

# NIC assignments for routing (same on both hosts)
storage_ips_nic_a:
  - "fc07:2::11"
  - "fc07:2::13"
  - "fc07:2::15"
  - "fc07:2::17"

storage_ips_nic_b:
  - "fc07:2::12"
  - "fc07:2::14"
  - "fc07:2::16"
  - "fc07:2::18"

# Per-host server IPs defined in host_vars
# diskpool01: a=fc07:2::1:a:22, b=fc07:2::2:a:22
# diskpool03: a=fc07:2::1:a:24, b=fc07:2::2:a:24

# Mount config
mount_base: "/dcache/pool"
nconnect: 16
rsize: 1048576
wsize: 1048576
mount_options: "vers=4.1,proto=tcp6,rsize={{ rsize }},wsize={{ wsize }},noatime,hard,nconnect={{ nconnect }}"

# Kernel module build
kernel_src_dir: "/home/netadmin/kernel-build/linux-source-7.0.0"
kernel_headers_dir: "/lib/modules/7.0.0-15-generic/build"
nfs_module_dest: "/lib/modules/7.0.0-15-generic/updates"
